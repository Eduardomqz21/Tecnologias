<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentacion de Tecnologias</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: linear-gradient(120deg, #f1f5f9, #e2e8f0);
        min-height: 100vh;
      }

      .hero-card {
        border: none;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <section class="card hero-card p-4 p-md-5">
        <h1 class="display-6 fw-bold mb-3">Tutorial de Tecnologias Web</h1>
        <p class="lead mb-4">
          Esta pagina de prueba conecta un frontend en HTML + Bootstrap con un backend en Node.js.
        </p>

        <div class="mb-3">
          <button id="load-data" class="btn btn-primary">Cargar tecnologias desde el backend</button>
        </div>

        <pre id="output" class="bg-dark text-light rounded p-3 mb-0">Esperando datos...</pre>
      </section>
    </main>

    <script>
      const button = document.getElementById("load-data");
      const output = document.getElementById("output");

      button.addEventListener("click", async () => {
        output.textContent = "Cargando...";

        try {
          const response = await fetch("/api/tecnologias");
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = `Error al conectar con el backend: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
